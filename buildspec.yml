version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-southeast-1
    REPOSITORY_URI: 354493396671.dkr.ecr.ap-southeast-1.amazonaws.com/hc-ecs-repo

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - docker build -t app .
      - docker tag app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - docker push $REPOSITORY_URI:latest
      - printf '[{"name":"hc-app-container","imageUri":"%s"}]' $REPOSITORY_URI:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json